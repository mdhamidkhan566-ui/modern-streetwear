<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Streetwear</title>
<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:#111;
color:white;
text-align:center;
}
header{
padding:60px 20px;
}
h1{
font-size:48px;
margin-bottom:10px;
}
p{
font-size:18px;
}
.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:30px;
}
.card{
background:#222;
border-radius:20px;
padding:20px;
}
.card img{
width:100%;
border-radius:15px;
}
button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:12px;
background:white;
color:black;
font-weight:bold;
cursor:pointer;
font-size:16px;
}
footer{
padding:30px;
background:#000;
margin-top:30px;
}
</style>
</head>
<body>

<header>
<h1>Modern Streetwear</h1>
<p>প্রিমিয়াম DTF প্রিন্টেড টি-শার্ট কালেকশন</p>
</header>

<section class="products">

<div class="card">
<img src="https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?q=80&w=1200&auto=format&fit=crop">
<h2>ওভারসাইজড DTF টি-শার্ট</h2>
<p>দাম: ৭৯০ টাকা</p>
<button>অর্ডার করুন</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?q=80&w=1200&auto=format&fit=crop">
<h2>এনিমে DTF টি-শার্ট</h2>
<p>দাম: ৮৫০ টাকা</p>
<button>অর্ডার করুন</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f?q=80&w=1200&auto=format&fit=crop">
<h2>স্ট্রিটওয়্যার টি-শার্ট</h2>
<p>দাম: ৯২০ টাকা</p>
<button>অর্ডার করুন</button>
</div>

</section>

<footer>
© ২০২৬ Modern Streetwear — সর্বস্বত্ব সংরক্ষিত
</footer>

</body>
</html>
